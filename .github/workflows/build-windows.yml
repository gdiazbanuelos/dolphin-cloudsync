name: Build Windows

on:
  push:
    branches: [ master ]
    paths:
      - 'Source/**'
      - 'Data/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: |
          msbuild Source/dolphin-emu.sln /p:Configuration=Release /p:Platform=x64 /m

      - name: Get version
        id: version
        shell: bash
        run: echo "version=v$(date -u +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: Zip release folder
        shell: pwsh
        run: |
          Compress-Archive -Path Binary\x64\* -DestinationPath Dolphin-CloudSync-Windows.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Dolphin CloudSync ${{ steps.version.outputs.version }}
          body: |
            ## What's included
            - Automatic Dropbox cloud save sync via rclone
            - Saves pushed to Dropbox on every in-game save
            - Saves pulled from Dropbox on every game launch
            - Works on Windows and Linux (including Steam Deck)

            ## Setup
            See the [README](https://github.com/gdiazbanuelos/dolphin-cloudsync#cloud-save-feature) for rclone setup instructions.
          files: Dolphin-CloudSync-Windows.zip
          prerelease: false
